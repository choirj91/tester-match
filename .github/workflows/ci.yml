name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: 03-output/app

jobs:
  test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: 03-output/app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  migration-check:
    name: Supabase migration syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint migrations
        working-directory: 03-output/supabase
        run: |
          # 마이그레이션 SQL 문법 점검 — 실제 DB는 띄우지 않음.
          for f in migrations/*.sql; do
            echo "--- $f ---"
            # 단순 파싱 체크: 빈 파일 / BOM 등.
            test -s "$f" || { echo "Empty migration: $f"; exit 1; }
          done
