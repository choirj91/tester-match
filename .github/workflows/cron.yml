name: Cron Jobs

on:
  schedule:
    # ── KST 기준 (UTC+9) ──────────────────────────────
    # 매일 KST 20:00 (UTC 11:00) — 체크인 리마인더
    - cron: "0 11 * * *"
    # 매일 KST 21:00 (UTC 12:00) — 미체크인 페널티 sweep
    - cron: "0 12 * * *"
    # 6시간 간격 — 앱 초대 링크 HEAD 검증
    - cron: "0 */6 * * *"
    # 매일 KST 09:00 (UTC 00:00) — 급구 자동 만료 sweep + D-1 알림
    - cron: "0 0 * * *"
  # 수동 실행 지원 (Dashboard Actions 탭 → Run workflow)
  workflow_dispatch:
    inputs:
      job:
        description: "실행할 작업"
        required: true
        type: choice
        options:
          - daily-checkin-reminder
          - penalty-sweep
          - validate-app-urls
          - boost-expiry-sweep
          - all

env:
  APP_URL: ${{ secrets.APP_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  # ── 체크인 리마인더 (KST 20:00) ────────────────────
  checkin-reminder:
    name: 체크인 리마인더
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.job == 'daily-checkin-reminder' || inputs.job == 'all') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 11')
    steps:
      - name: Call /api/cron/daily-checkin-reminder
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$APP_URL/api/cron/daily-checkin-reminder" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || exit 1

  # ── 페널티 sweep (KST 21:00) ────────────────────────
  penalty-sweep:
    name: 페널티 Sweep
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.job == 'penalty-sweep' || inputs.job == 'all') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 12')
    steps:
      - name: Call /api/cron/penalty-sweep
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$APP_URL/api/cron/penalty-sweep" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || exit 1

  # ── 급구 자동 만료 sweep (KST 09:00) ────────────────
  boost-expiry-sweep:
    name: 급구 만료 Sweep
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.job == 'boost-expiry-sweep' || inputs.job == 'all') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 0 ')
    steps:
      - name: Call /api/cron/boost-expiry-sweep
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$APP_URL/api/cron/boost-expiry-sweep" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || exit 1

  # ── 앱 링크 검증 (6시간 간격) ────────────────────────
  validate-urls:
    name: 앱 URL 검증
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.job == 'validate-app-urls' || inputs.job == 'all') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 */6')
    steps:
      - name: Call /api/cron/validate-app-urls
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$APP_URL/api/cron/validate-app-urls" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || exit 1
